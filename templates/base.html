<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% block meta_description %}RealEstate360+ — Property Management Portal{% endblock %}">
  <title>{% block title %}RealEstate360+{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Design System - CSS Custom Properties */
    :root {
      /* Colors */
      --color-primary: #172554;
      --color-primary-light: #1e3a8a;
      --color-primary-dark: #0f172a;
      --color-secondary: #22c55e;
      --color-secondary-light: #4ade80;
      --color-accent: #3b82f6;
      --color-accent-light: #60a5fa;
      
      /* Neutral Colors */
      --color-gray-50: #f8fafc;
      --color-gray-100: #f1f5f9;
      --color-gray-200: #e2e8f0;
      --color-gray-300: #cbd5e1;
      --color-gray-400: #94a3b8;
      --color-gray-500: #64748b;
      --color-gray-600: #475569;
      --color-gray-700: #334155;
      --color-gray-800: #1e293b;
      --color-gray-900: #0f172a;
      
      /* Semantic Colors */
      --color-success: #22c55e;
      --color-success-bg: #dcfce7;
      --color-warning: #f59e0b;
      --color-warning-bg: #fef3c7;
      --color-error: #ef4444;
      --color-error-bg: #fee2e2;
      --color-info: #3b82f6;
      --color-info-bg: #eff6ff;
      
      /* Spacing Scale */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;
      
      /* Border Radius */
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
      --radius-full: 9999px;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      
      /* Typography */
      --font-size-xs: 0.75rem;
      --font-size-sm: 0.875rem;
      --font-size-base: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
      --font-size-3xl: 1.875rem;
      --font-size-4xl: 2.25rem;
      
      /* Line Heights */
      --line-height-tight: 1.25;
      --line-height-normal: 1.5;
      --line-height-relaxed: 1.75;
      
      /* Transitions */
      --transition-fast: 0.15s ease;
      --transition-normal: 0.2s ease;
      --transition-slow: 0.3s ease;
    }
    
    /* Base Styles */
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: var(--line-height-normal);
      color: var(--color-gray-800);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Shared animation utilities referenced by tenant templates */
    .fade-in,
    .animate-fade-in {
      animation: fadeInUp 0.35s ease both;
    }
    
    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(8px); 
      }
      to   { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    
    @keyframes slideInRight {
      from { 
        opacity: 0; 
        transform: translateX(16px); 
      }
      to   { 
        opacity: 1; 
        transform: translateX(0); 
      }
    }
    
    /* Utility Classes */
    .text-gradient {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .card-hover {
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }
    
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      color: white;
      border: none;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-xl);
      font-weight: 600;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-md);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    /* Focus Styles for Accessibility */
    .focus-ring:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
    
    .focus-ring:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
